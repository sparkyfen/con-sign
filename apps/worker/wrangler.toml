name = "con-sign"
main = "src/index.ts"
compatibility_date = "2024-10-04"
compatibility_flags = ["nodejs_compat"]

# Bundle .wasm imports as CompiledWasm so `import wasm from '...wasm'`
# resolves to a WebAssembly.Module at runtime. resvg-wasm depends on this
# for its initWasm() call.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Bundle .ttf font files as raw bytes so resvg can rasterize text. Workers
# have no system fonts; without these, text glyphs render invisible.
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

# Apex (`cons.social`) is owned by the Pages project (`con-sign`). The
# Worker only handles the API surface via this route.
routes = [
  { pattern = "cons.social/api/*", zone_name = "cons.social" },
]

# ─── D1 ────────────────────────────────────────────────────────────────────
# Create with: wrangler d1 create con-sign-db
# Then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "con-sign-db"
database_id = "828c5f75-6215-47e8-ad2f-e20532d69495"
migrations_dir = "src/db/migrations"

# ─── KV (sessions / session-revocation list) ───────────────────────────────
# Create with: wrangler kv namespace create SESSIONS
[[kv_namespaces]]
binding = "SESSIONS"
id = "9b0d2db6fc144c1291f8d7ade58f68eb"

# ─── Workers Rate Limiting (per-cookie unlock attempts) ────────────────────
# 10 attempts per 60s window, keyed by visitor cookie id.
[[unsafe.bindings]]
name = "UNLOCK_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Per-session cap on /api/rooms/:id/devices/claim attempts. Defends against a
# logged-in attacker brute-forcing the 5-minute pair-code keyspace (32^6).
# 30 attempts/60s allows the legitimate "I mistyped the code" case while
# stopping any meaningful brute-force cold. Keyed by session jti so a
# stolen session can't escape its own bucket. Different namespace_id from
# UNLOCK_RL so the buckets don't share state.
[[unsafe.bindings]]
name = "CLAIM_RL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# Per-visitor cap on /api/avatar/tg/:id cache misses, keyed on the
# `cs_visitor` cookie minted by /api/r/:slug. Falls back to IP for
# cookieless hits (direct API). Per-visitor keying is the NAT-safe
# choice — hundreds of con attendees on the same hotel Wi-Fi each
# get their own bucket instead of collectively saturating the venue
# IP's bucket on cold start. 30/60s is generous given the edge
# cache absorbs every duplicate before we ever reach this limiter.
[[unsafe.bindings]]
name = "AVATAR_RL"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

# ─── Cron Trigger (daily ICS sync from furrycons.com) ──────────────────────
[triggers]
crons = ["0 7 * * *"]  # 07:00 UTC daily

# ─── Vars (non-secret config) ──────────────────────────────────────────────
[vars]
ICS_FEED_URL = "https://furrycons.com/calendar/furrycons.ics"
TURNSTILE_SITE_KEY = "0x4AAAAAADF5H74jQfg4RtQI"

# ─── Secrets (DO NOT commit; set with `wrangler secret put`) ───────────────
# Required:
#   wrangler secret put SESSION_HMAC          # 64-char random hex
#   wrangler secret put BSKY_PRIVATE_JWKS     # JSON array of ES256 private JWKs (mint with `pnpm run keygen:bsky -- --jwks`)
#       (legacy single-key form BSKY_PRIVATE_JWK still accepted; wrap it
#        into [_JWK] when rotating.)
#   wrangler secret put TG_BOT_TOKEN          # Telegram bot token (login + avatars)
#   wrangler secret put TURNSTILE_SECRET      # Cloudflare Turnstile secret key
